<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gallery Manager — Nizar Naseer Studio</title>
<link rel="icon" href="favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0b;--card:#111114;--border:rgba(255,255,255,0.08);--gold:#c9a96e;--gold2:#e8c98a;--text:#e8e6e0;--muted:#7a7870}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
header h1{font-size:1.1rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
header span{color:var(--muted);font-size:0.8rem}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
.toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.toolbar-left{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:600;letter-spacing:0.5px;transition:all .2s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn-green:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-sm{padding:6px 12px;font-size:0.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Status bar */
.status-bar{background:rgba(201,169,110,0.06);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:20px;font-size:0.78rem;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
.status-bar span{display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%}
.dot-green{background:#22c55e}.dot-red{background:#ef4444}.dot-yellow{background:#eab308}

/* Albums grid */
.albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.album-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s}
.album-card:hover{border-color:rgba(201,169,110,0.3)}
.album-cover{height:150px;background:linear-gradient(135deg,#1a1208,#2a1e0a);background-size:cover;background-position:center;position:relative}
.album-cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);display:flex;align-items:flex-end;padding:12px}
.album-cover-badge{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:rgba(0,0,0,0.5);padding:3px 8px;border-radius:4px;backdrop-filter:blur(4px)}
.album-body{padding:14px 16px}
.album-title{font-size:0.92rem;font-weight:600;margin-bottom:3px}
.album-meta{font-size:0.73rem;color:var(--muted);margin-bottom:10px}
.album-actions{display:flex;gap:8px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-overlay.open{display:flex}
.modal{background:#13131a;border:1px solid var(--border);border-radius:18px;width:90%;max-width:580px;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-size:1.05rem;font-weight:600;color:var(--gold);margin-bottom:20px;letter-spacing:1px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:0.76rem;color:var(--muted);margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}
.form-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:0.88rem;outline:none;font-family:inherit;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
select.form-input option{background:#13131a}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-top:6px;position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--gold);background:rgba(201,169,110,0.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone p{color:var(--muted);font-size:0.85rem}
.upload-zone span{color:var(--gold);font-weight:600}
.upload-progress{margin-top:12px;display:none}
.progress-item{display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px;font-size:0.8rem}
.progress-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;width:0%}
.progress-status{font-size:0.7rem;color:var(--muted);min-width:50px;text-align:right}
.photos-list{margin-top:12px}
.photo-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px}
.photo-row img{width:40px;height:40px;object-fit:cover;border-radius:6px}
.photo-url{flex:1;font-size:0.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.photo-del{background:none;border:none;color:#f87171;cursor:pointer;font-size:1rem;padding:4px}
.photo-move{background:none;border:1px solid rgba(255,255,255,0.15);color:var(--gold);cursor:pointer;font-size:0.8rem;padding:2px 6px;border-radius:4px;line-height:1.4;transition:background .15s}
.photo-move:hover{background:rgba(201,169,110,0.15)}
.photo-move:disabled{opacity:0.25;cursor:default}
.url-input-row{display:flex;gap:8px;margin-top:8px}
.url-input-row .form-input{flex:1}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-state h3{font-size:1.1rem;margin-bottom:8px;color:var(--text)}
</style>
</head>
<body>
<header>
  <div>
    <h1>📸 Gallery Manager</h1>
    <span id="studioName">Nizar Naseer Studio · Admin</span>
  </div>
  <a href="admin.html" style="margin-left:auto;color:var(--muted);font-size:0.82rem;text-decoration:none">← Admin</a>
</header>

<div class="container">

  <!-- Status bar -->
  <div class="status-bar">
    <span><span class="dot" id="dotCloudinary"></span> <span id="lblCloudinary">Cloudinary</span></span>
    <span><span class="dot" id="dotGithub"></span> <span id="lblGithub">GitHub deploy</span></span>
    <span style="color:var(--text)" id="albumCount">Loading…</span>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn btn-gold" onclick="openAddModal()">+ New Album</button>
      <button class="btn btn-green" id="saveCloudBtn" onclick="saveToCloud()">☁️ Save & Deploy</button>
    </div>
  </div>

  <div class="albums-grid" id="albumsGrid">
    <div class="empty-state" style="grid-column:1/-1"><h3>Loading gallery…</h3></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">New Album</h2>
    <input type="hidden" id="editingId"/>
    <div class="form-row-2">
      <div class="form-row">
        <label>Album Title</label>
        <input class="form-input" id="fTitle" placeholder="e.g. Zarif Weds Anis"/>
      </div>
      <div class="form-row">
        <label>Category</label>
        <select class="form-input" id="fCategory">
          <option>Wedding</option><option>Tunang</option><option>Nikah</option>
          <option>Portrait</option><option>Editorial</option><option>Studio Raya</option><option>Event</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>Date & Venue</label>
        <input class="form-input" id="fDate" placeholder="14 Dec 2024 · Dewan Sri Penang"/>
      </div>
      <div class="form-row">
        <label>Layout</label>
        <select class="form-input" id="fLayout">
          <option value="">Normal</option>
          <option value="span2">Wide (2 columns)</option>
          <option value="tall">Tall</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Upload Photos (Cloudinary CDN — free)</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" multiple id="fileInput" onchange="handleFiles(this.files)"/>
        <p>🖼️ Drag & drop photos here or <span>click to browse</span></p>
        <p style="font-size:0.72rem;margin-top:5px;color:var(--muted)">JPEG · PNG · WEBP · Multiple files OK</p>
      </div>
      <div class="upload-progress" id="uploadProgress"></div>
    </div>
    <div class="form-row">
      <label>Or paste any image URL</label>
      <div class="url-input-row">
        <input class="form-input" id="urlInput" placeholder="https://res.cloudinary.com/..."/>
        <button class="btn btn-outline btn-sm" onclick="addUrlPhoto()">Add</button>
      </div>
    </div>
    <div class="photos-list" id="photosList"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-gold" style="flex:1" onclick="saveAlbum()">Save Album</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
/* ── Config from config.js (hardcoded, no manual entry needed) ── */
const CFG = window.STUDIO_CONFIG || {};
const CLD_NAME   = CFG.cloudinary_cloud_name    || '';
const CLD_PRESET = CFG.cloudinary_upload_preset || '';

let albums     = [];
let editPhotos = [];

/* ── Status indicators ── */
function updateStatus() {
  const dc = document.getElementById('dotCloudinary');
  const lc = document.getElementById('lblCloudinary');
  if (CLD_NAME && CLD_PRESET && !CLD_NAME.startsWith('YOUR')) {
    dc.className = 'dot dot-green'; lc.textContent = 'Cloudinary ready ✓';
  } else {
    dc.className = 'dot dot-yellow';
    lc.textContent = 'Cloudinary: add keys to config.js';
  }
  document.getElementById('dotGithub').className = 'dot dot-green';
  document.getElementById('lblGithub').textContent = 'Auto-deploy ready ✓';
}

/* ── Load gallery ── */
fetch('/api/gallery')
  .then(r => r.json())
  .then(d => {
    if (d.albums?.length) { albums = d.albums; renderAlbums(); return; }
    return fetch('gallery.json?v=' + Date.now()).then(r => r.json()).then(d2 => { albums = d2.albums || []; renderAlbums(); });
  })
  .catch(() => fetch('gallery.json?v=' + Date.now()).then(r => r.json()).then(d => { albums = d.albums || []; renderAlbums(); }).catch(() => renderAlbums()));

window.addEventListener('load', updateStatus);

/* ── Render albums ── */
function renderAlbums() {
  const grid = document.getElementById('albumsGrid');
  document.getElementById('albumCount').textContent = albums.length + ' albums';
  if (!albums.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>No albums yet</h3><p>Click "+ New Album" to add your first wedding shoot</p></div>';
    return;
  }
  grid.innerHTML = albums.map((a, i) => {
    const cover = a.teasers?.[0]?.src || '';
    const bg = cover ? `background-image:url('${cover}')` : `background:${a.coverGradient || '#1a1208'}`;
    return `
    <div class="album-card">
      <div class="album-cover" style="${bg};background-size:cover;background-position:center">
        <div class="album-cover-overlay">
          <span class="album-cover-badge">${a.category}</span>
        </div>
      </div>
      <div class="album-body">
        <div class="album-title">${a.title}</div>
        <div class="album-meta">${a.date} · ${a.teasers?.length || 0} photos</div>
        <div class="album-actions">
          <button class="btn btn-outline btn-sm" onclick="openEditModal(${i})">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAlbum(${i})">🗑 Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Modal ── */
function openAddModal() {
  editPhotos = [];
  document.getElementById('editingId').value = '';
  document.getElementById('modalTitle').textContent = 'New Album';
  ['fTitle','fDate'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCategory').value = 'Wedding';
  document.getElementById('fLayout').value = '';
  document.getElementById('photosList').innerHTML = '';
  document.getElementById('uploadProgress').innerHTML = '';
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}
function openEditModal(i) {
  const a = albums[i];
  editPhotos = (a.teasers || []).map(t => ({ src: t.src || t.fallback || '', preview: t.src || t.fallback || '' }));
  document.getElementById('editingId').value = i;
  document.getElementById('modalTitle').textContent = 'Edit Album';
  document.getElementById('fTitle').value    = a.title;
  document.getElementById('fDate').value     = a.date;
  document.getElementById('fCategory').value = a.category;
  document.getElementById('fLayout').value   = a.layout || '';
  renderPhotosList();
  document.getElementById('uploadProgress').innerHTML = '';
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

/* ── Photos UI ── */
function renderPhotosList() {
  const total = editPhotos.length;
  document.getElementById('photosList').innerHTML = editPhotos.map((p, i) => `
    <div class="photo-row">
      <div style="display:flex;flex-direction:column;gap:2px">
        <button class="photo-move" onclick="movePhoto(${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="photo-move" onclick="movePhoto(${i}, 1)" ${i===total-1?'disabled':''}>▼</button>
      </div>
      <img src="${p.preview}" onerror="this.style.display='none'" alt=""/>
      <span class="photo-url">${i===0?'<b style="color:var(--gold);font-size:0.7rem">COVER</b> ':''} ${p.src}</span>
      <button class="photo-del" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}
function movePhoto(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= editPhotos.length) return;
  [editPhotos[i], editPhotos[j]] = [editPhotos[j], editPhotos[i]];
  renderPhotosList();
}
function addUrlPhoto() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  editPhotos.push({ src: url, preview: url });
  document.getElementById('urlInput').value = '';
  renderPhotosList();
}

/* ── Cloudinary Upload ── */
async function handleFiles(files) {
  if (!CLD_NAME || CLD_NAME.startsWith('YOUR')) {
    alert('⚠️ Add your Cloudinary cloud_name and upload_preset to config.js first.\n\nGet them free at cloudinary.com');
    return;
  }
  const prog = document.getElementById('uploadProgress');
  prog.style.display = 'block';
  for (const file of files) {
    const id = 'p' + Date.now();
    prog.insertAdjacentHTML('beforeend', `
      <div class="progress-item" id="${id}">
        <span style="flex:0 0 130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</span>
        <div class="progress-bar-wrap"><div class="progress-bar" id="bar_${id}"></div></div>
        <span class="progress-status" id="st_${id}">Uploading…</span>
      </div>`);
    try {
      const url = await cloudinaryUpload(file, id);
      document.getElementById('bar_' + id).style.width = '100%';
      document.getElementById('st_' + id).textContent = '✅';
      editPhotos.push({ src: url, preview: url });
      renderPhotosList();
    } catch(e) {
      document.getElementById('st_' + id).textContent = '❌';
    }
  }
}
/* ── Compress image to max 1920px before uploading (speeds up upload 10x) ── */
function compressImage(file, maxPx = 1920, quality = 0.82) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else                { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', quality);
    };
    img.onerror = () => resolve(file); // fallback to original
    img.src = url;
  });
}

function cloudinaryUpload(file, id) {
  return new Promise(async (resolve, reject) => {
    const compressed = await compressImage(file);
    const fd = new FormData();
    fd.append('file', compressed, file.name);
    fd.append('upload_preset', CLD_PRESET);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_NAME}/image/upload`);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) document.getElementById('bar_' + id).style.width = Math.round(e.loaded/e.total*90) + '%';
    };
    xhr.onload = () => {
      const r = JSON.parse(xhr.responseText);
      r.secure_url ? resolve(r.secure_url) : reject(new Error(r.error?.message));
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send(fd);
  });
}

/* ── Save album ── */
function saveAlbum() {
  const title    = document.getElementById('fTitle').value.trim();
  const date     = document.getElementById('fDate').value.trim();
  const category = document.getElementById('fCategory').value;
  const layout   = document.getElementById('fLayout').value;
  if (!title) { alert('Enter an album title'); return; }
  if (!editPhotos.length) { alert('Add at least one photo'); return; }
  const slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  const teasers = editPhotos.map(p => ({ src: p.src, g: 'linear-gradient(135deg,#1a1208,#2a1e0a)' }));
  const album = { id: slug, title, date, category, layout, coverGradient: 'linear-gradient(135deg,#1a1208,#2a1e0a)', teasers };
  const idx = document.getElementById('editingId').value;
  if (idx !== '') albums[parseInt(idx)] = album; else albums.unshift(album);
  renderAlbums();
  closeModal();
}

/* ── Delete ── */
function deleteAlbum(i) {
  if (!confirm(`Delete "${albums[i].title}"?`)) return;
  albums.splice(i,1);
  renderAlbums();
}

/* ── Save & Deploy (backend commits to GitHub → Vercel auto-deploys) ── */
async function saveToCloud() {
  const btn = document.getElementById('saveCloudBtn');
  btn.textContent = '⏳ Deploying…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/update-gallery', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ albums }),
    });
    const j = await r.json();
    if (j.ok) {
      btn.textContent = '✅ Live in ~30s';
      setTimeout(() => { btn.textContent = '☁️ Save & Deploy'; btn.disabled = false; }, 10000);
    } else throw new Error(j.error);
  } catch(e) {
    btn.textContent = '❌ Failed';
    btn.disabled = false;
    alert('Error: ' + e.message + '\n\nMake sure GITHUB_TOKEN and GITHUB_REPO are set in Vercel → Settings → Environment Variables');
  }
}

/* ── Drag & drop ── */
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
</script>
</body>
</html>
